name: tests
on: [push, pull_request, workflow_dispatch]
jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install -e ".[test,gui]"
      - run: python -m pytest tests/unit -m "not integration" --ignore=tests/unit/test_audit_logger.py
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install -e ".[audit,test]"
      - run: python -m pytest tests/unit/test_audit_logger.py tests/unit/test_audit.py
  ollama-integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install -e ".[test]"
      - run: RUN_OLLAMA_INTEGRATION=1 python -m pytest tests/integration
